name: Terraform Plan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Verify AWS Identity (Debug Step – Keep It)
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 4️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 5️⃣ Terraform Init
      - name: Terraform Init
        run: terraform init

      # 6️⃣ Terraform Plan
      - name: Terraform Plan
        run: terraform plan -out=plan.tfplan

      # 7️⃣ Convert Plan to JSON
      - name: Convert Plan to JSON
        run: terraform show -json plan.tfplan > plan.json

      # 8️⃣ Convert Plan to Markdown (tfplan2md)
      - name: Generate Markdown Report
        run: |
          docker run -v ${{ github.workspace }}:/data oocx/tfplan2md /data/plan.json > plan.md

      # 9️⃣ Upload Plan Report as Artifact
      - name: Upload Plan Report
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-report
          path: plan.md